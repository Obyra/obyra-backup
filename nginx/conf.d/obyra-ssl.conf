# ============================================
# OBYRA - Production Nginx Config with SSL
# ============================================
# Usar con docker-compose.prod.yml
# Reemplazar DOMINIO por tu dominio real (ej: app.obyra.com)

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# HTTP → HTTPS redirect + ACME challenge
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check sin SSL (para load balancers internos)
    location /health {
        proxy_pass http://flask_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # Redirect todo lo demás a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name _;  # Reemplazar con tu dominio

    # SSL Certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/DOMINIO/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMINIO/privkey.pem;

    # SSL Security
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Max upload size
    client_max_body_size 50M;

    # Health check
    location /health {
        proxy_pass http://flask_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # Rate limited: login/register
    location ~ ^/(auth/(login|register)|proveedor/login) {
        limit_req zone=login_limit burst=5 nodelay;
        limit_conn conn_limit 10;
        include /etc/nginx/conf.d/proxy_params.conf;
        proxy_pass http://flask_backend;
    }

    # Rate limited: API endpoints
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        include /etc/nginx/conf.d/proxy_params.conf;
        proxy_pass http://flask_backend;
    }

    # Static files (cached, no auth needed for CSS/JS/images)
    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";

        # EXCEPCIÓN: uploads requieren autenticación
        location /static/uploads/ {
            # Bloquear acceso directo a uploads - usar /secure-uploads/ en su lugar
            return 403;
        }
    }

    # Service Worker (sin cache)
    location = /sw.js {
        include /etc/nginx/conf.d/proxy_params.conf;
        proxy_pass http://flask_backend;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Main application
    location / {
        limit_req zone=general_limit burst=10 nodelay;
        limit_conn conn_limit 20;
        include /etc/nginx/conf.d/proxy_params.conf;
        proxy_pass http://flask_backend;
    }
}
