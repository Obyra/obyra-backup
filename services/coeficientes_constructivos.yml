      - clave: mo_oficial_platea
        tipo: mano_obra
        nombre: 'Oficial hormigon'
        unidad: jornal
        coeficiente: 0.72   # 2026-07-20: DE-BUNDLED 14 hh/m3 (sin encofrado)
      - clave: mo_ayudante_platea
        tipo: mano_obra
        nombre: 'Ayudante hormigon'
        unidad: jornal
        coeficiente: 1.03
      - clave: mixer_platea
        tipo: equipo
        nombre: 'Mixer / hormigonera'
        unidad: dia
        coeficiente: 0.3

  zapata_corrida:
    descripcion: 'Zapata corrida / base aislada'
    unidad_item: m3
    encofrado_contacto_m2_m3: 0   # sin encofrado (se cuela contra el terreno) -> bundled = de-bundled
    recursos:
      - clave: hormigon_h17_zapata
        tipo: material
        nombre: 'Hormigon H17 elaborado'
        unidad: m3
        coeficiente: 1.05
      - clave: hierro_zapata
        tipo: material
        nombre: 'Hierro construccion 8-12mm'
        unidad: kg
        coeficiente: 75
      - clave: mo_oficial_zapata
        tipo: mano_obra
        nombre: 'Oficial hormigon'
        unidad: jornal
        coeficiente: 0.8    # 2026-07-20: DE-BUNDLED 16 hh/m3 (sin encofrado)
      - clave: mo_ayudante_zapata
        tipo: mano_obra
        nombre: 'Ayudante hormigon'
        unidad: jornal
        coeficiente: 1.2

  # ===========================================================================
  # Mamposteria
  # ===========================================================================
  mamposteria_ladrillo_hueco_12:
    descripcion: 'Mamposteria ladrillo hueco 12 cm'
    unidad_item: m2
    recursos:
      - clave: ladrillo_hueco_12
        tipo: material
        nombre: 'Ladrillo hueco 12x18x33'
        unidad: u
        coeficiente: 12.5
      - clave: mortero_mh12
        tipo: material
