        unidad: m3
        coeficiente: 0.022
      - clave: mo_oficial_mh12
        tipo: mano_obra
        nombre: 'Oficial albañil'
        unidad: jornal
        coeficiente: 0.15   # 2026-07-20: rendimiento validado Brenda 2.4 hh/m2 (era 5.6)
      - clave: mo_ayudante_mh12
        tipo: mano_obra
        nombre: 'Ayudante albañil'
        unidad: jornal
        coeficiente: 0.15

  mamposteria_ladrillo_hueco_18:
    descripcion: 'Mamposteria ladrillo hueco 18 cm'
    unidad_item: m2
    recursos:
      - clave: ladrillo_hueco_18
        tipo: material
