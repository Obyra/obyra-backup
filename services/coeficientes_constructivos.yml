        unidad: jornal
        coeficiente: 0.10   # 2026-07-20: validado Brenda 1.6 hh/m2 (era 3.2)
      - clave: mo_ayudante_revoque
        tipo: mano_obra
        nombre: 'Ayudante revoquero'
        unidad: jornal
