        nombre: 'Pintura latex interior'
        unidad: l
        coeficiente: 0.30
        notas: '0.15 L/m2 x 2 manos.'
      - clave: fijador_latex
        tipo: material
        nombre: 'Fijador al agua'
        unidad: l
        coeficiente: 0.10
      - clave: mo_oficial_pintura
        tipo: mano_obra
        nombre: 'Oficial pintor'
        unidad: jornal
        coeficiente: 0.05
      - clave: mo_ayudante_pintura
        tipo: mano_obra
        nombre: 'Ayudante pintor'
        unidad: jornal
        coeficiente: 0.05

