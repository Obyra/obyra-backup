name: CI - Tests & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: obyra_test
          POSTGRES_USER: obyra_test
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U obyra_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linter (ruff)
        continue-on-error: true
        run: |
          pip install ruff
          ruff check --select E,W,F --ignore E501,W503 --exit-zero .

      - name: Run tests
        env:
          FLASK_ENV: testing
          SECRET_KEY: test-secret-key-for-ci-only
          DATABASE_URL: postgresql+psycopg://obyra_test:test_password@localhost:5432/obyra_test
          REDIS_URL: redis://localhost:6379/0
          ADMIN_DEFAULT_PASSWORD: TestAdminPass123
        run: |
          python -m pytest tests/ -v --tb=short --co -q 2>/dev/null | head -50
          python -m pytest tests/ -v --tb=short -x 2>&1 | tail -30

      - name: Check syntax of all Python files
        run: |
          python -c "
          import py_compile, glob, sys
          errors = []
          for f in glob.glob('**/*.py', recursive=True):
              if '.venv' in f or 'node_modules' in f:
                  continue
              try:
                  py_compile.compile(f, doraise=True)
              except py_compile.PyCompileError as e:
                  errors.append(str(e))
          if errors:
              for e in errors: print(e)
              sys.exit(1)
          print(f'OK: All Python files compile successfully')
          "
